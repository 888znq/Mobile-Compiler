<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ AI Compile - Clean Slate Core</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000432; font-family: 'JetBrains Mono', monospace; padding-bottom: 22px; }

/* ── Split-pane layout ───────────────────────────────────────── */
#splitPane {
  position: fixed; inset: 0; bottom: 22px;
  display: flex; flex-direction: row;
}
#editorPane {
  width: 0; min-width: 0; overflow: hidden;
  transition: width 0.25s ease;
  background: #0d0f2b; border-right: 2px solid #1a1f4e;
  flex-shrink: 0; position: relative;
}
#editorPane.open { width: 50%; min-width: 280px; }
#monacoContainer { width: 100%; height: 100%; }

#previewPane {
  flex: 1; overflow: hidden; position: relative;
}
#preview {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none; background: #000432;
  z-index: 1;
}

#fring {
  position: absolute; inset: 0; z-index: 99;
  border: 3px solid #00ff88;
  box-shadow: inset 0 0 60px rgba(0, 255, 136, .12);
  pointer-events: none; opacity: 0; transition: opacity .5s;
}
#fring.on { opacity: 1; }

/* Status Bar */
#statusBar {
  position: fixed; bottom: 0; left: 0; width: 100%; height: 22px;
  background: rgba(0, 0, 0, 0.9); border-top: 1px solid #333; z-index: 999;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 15px; font-size: 11px; color: #8be9fd; letter-spacing: 0.5px;
}
.status-item { opacity: 0.8; }

#controls {
  position: fixed; top: 20px; right: 20px; z-index: 100;
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end;
  max-width: 900px; align-items: center;
}

button.btn {
  background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(0, 255, 136, 0.3);
  color: #00ff88; padding: 10px 16px; border-radius: 8px;
  font: 700 11px/1 'JetBrains Mono', monospace;
  cursor: pointer; backdrop-filter: blur(12px); outline: none;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); transition: all 0.2s ease;
}
button.btn:hover { 
  background: rgba(0, 255, 136, 0.15); border-color: #00ff88; transform: translateY(-2px);
}
button.btn:active { transform: scale(0.96); }
button.btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #555; color: #888; }

#toast {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  padding: 8px 20px; border-radius: 20px; font: 700 11px/1 'JetBrains Mono', monospace;
  letter-spacing: .5px; background: rgba(0, 0, 0, .85);
  border: 1px solid rgba(0, 255, 136, .4); color: #00ff88;
  backdrop-filter: blur(8px); z-index: 100; pointer-events: none;
  opacity: 0; transition: opacity .25s, transform .25s;
}
#toast.show { opacity: 1; transform: translate(-50%, -5px); }

#gutterOverlay {
  position: fixed; left: 0; top: 0; bottom: 22px; width: 5px;
  z-index: 97; pointer-events: none;
}
.gutter-mark {
  position: absolute; left: 0; width: 5px; height: 5px; border-radius: 0 2px 2px 0;
}
.gutter-mark.error   { background: #ff5555; box-shadow: 0 0 4px #ff5555; }
.gutter-mark.warning { background: #ffb86c; box-shadow: 0 0 4px #ffb86c; }

/* ── Centralized Error Modal ─────────────────────────────────── */
#errorModal {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.85); display: none;
  align-items: center; justify-content: center; backdrop-filter: blur(6px);
}
#errorModal.show { display: flex; }
#errorBox {
  background: #0d0f2b; border: 1px solid #ff5555; border-radius: 12px;
  width: min(92vw, 650px); max-height: 80vh; overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 0 60px rgba(255,85,85,0.15);
}
#errorBox h3 { color: #ff5555; padding: 14px 18px; border-bottom: 1px solid #1a1f4e; font-size: 13px; margin: 0; }
#errorText {
  flex: 1; overflow-y: auto; padding: 16px 18px; margin: 0;
  font-size: 11px; font-family: 'JetBrains Mono', monospace; color: #f8f8f2; white-space: pre-wrap; line-height: 1.6;
}
#errorActions { display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid #1a1f4e; justify-content: flex-end; }
</style>
</head>
<body>

<script>
  var require = { paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } };
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

<div id="splitPane">
  <div id="editorPane">
    <div id="monacoContainer"></div>
  </div>
  <div id="previewPane">
    <iframe id="preview" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups"></iframe>
    <div id="fring"></div>
  </div>
</div>
<div id="gutterOverlay"></div>

<div id="statusBar">
  <span class="status-item" id="statusLeft">🚀 Fast-Patch Engine Active</span>
  <span class="status-item" id="statusRight">📄 Workspace Empty</span>
</div>

<div id="controls">
  <button id="clearBtn" class="btn" style="border-color: #ff5555; color: #ff5555;" title="Wipe Workspace">⊘ Clear</button>
  <button id="undoBtn" class="btn" style="border-color: #ffb86c; color: #ffb86c;" disabled title="Ctrl+Z">↩ Undo</button>
  <button id="redoBtn" class="btn" style="border-color: #ffb86c; color: #ffb86c;" disabled title="Ctrl+Y">↪ Redo</button>
  <button id="fileBtn" class="btn">🔗 Link File</button>
  <button id="promptBtn" class="btn" style="border-color: #8be9fd; color: #8be9fd;">🤖 Copy AI Prompt</button>
  <button id="exportBtn" class="btn" style="border-color: #8be9fd; color: #8be9fd;" title="Manual Save for Mobile">💾 Export</button>
  <button id="pasteProcessBtn" class="btn" style="border-color: #50fa7b; color: #50fa7b;" title="Ctrl+V to Auto-Patch">📋 Paste & Process</button>
  <button id="editorToggleBtn" class="btn" style="border-color:#50fa7b; color:#50fa7b;">⬛ Editor</button>
</div>

<div id="toast"></div>

<div id="errorModal">
  <div id="errorBox">
    <h3 id="errorTitle">⚠️ Error Detected</h3>
    <pre id="errorText"></pre>
    <div id="errorActions">
      <button id="errCloseBtn" class="btn" style="border-color:#6272a4;color:#6272a4;">✕ Close</button>
      <button id="errCopyBtn" class="btn" style="border-color:#8be9fd;color:#8be9fd;">📋 Copy Error</button>
    </div>
  </div>
</div>

<script>
  const SUPER_PROMPT = `[Give me the results as Combined Find-and-Replace blocks. Put the old code and the new code inside a single code block separated by exactly ===SPLIT=== on its own line so I only have to click 'copy' once. response must contain ONLY the code blocks. Double-check that you haven't left any brackets } or parentheses ) unclosed. For multiple independent fixes, separate each OLD===SPLIT===NEW pair with ===BLOCK===.]`;

  const $pv = document.getElementById('preview');
  const $fring = document.getElementById('fring');
  const $toast = document.getElementById('toast');
  const $errorModal = document.getElementById('errorModal');
  const $errorTitle = document.getElementById('errorTitle');
  const $errorText = document.getElementById('errorText');
  
  let fileHandle = null;
  let sourceContent = '';
  let undoStack = [];
  let redoStack = []; 
  let lspDiagnostics = [];
  let pendingLSPVeto = false;

  // ── Clear Workspace ──────────────────────────────
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (confirm("Wipe workspace and start fresh? This cannot be undone.")) {
      sourceContent = "";
      undoStack = [];
      redoStack = [];
      lspDiagnostics = [];
      localStorage.removeItem('aicompiler_source');
      render("");
      syncEditorContent("");
      document.getElementById('undoBtn').disabled = true;
      document.getElementById('redoBtn').disabled = true;
      toast("⊘ Workspace Cleared");
    }
  });

  // ── Manual Export ────────────────────────────────
  document.getElementById('exportBtn').addEventListener('click', () => {
    if (!sourceContent) return toast("❌ Nothing to export");
    let filename = fileHandle ? fileHandle.name : "index.html";
    const blob = new Blob([sourceContent], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast(`💾 Exported: ${filename}`);
  });

  // ── Prompt Copy Tool ─────────────────────────────
  document.getElementById('promptBtn').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(SUPER_PROMPT);
      toast("🤖 AI Prompt Copied!");
    } catch (err) { toast("❌ Failed to copy prompt."); }
  });

  // ── Error Management ─────────────────────────────
  function showError(title, details) {
    $errorTitle.textContent = title;
    $errorText.textContent = details;
    $errorModal.classList.add('show');
  }
  document.getElementById('errCloseBtn').addEventListener('click', () => $errorModal.classList.remove('show'));
  document.getElementById('errCopyBtn').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(`[${$errorTitle.textContent}]\n${$errorText.textContent}`);
      toast("📋 Error Copied!");
    } catch(e) { toast("❌ Failed to copy"); }
  });

  window.addEventListener('message', (e) => {
    if (e.data && e.data.__compilerErr) showError("Runtime Error", e.data.__compilerErr);
  });

  // ── Monaco Editor ─────────────────────────────
  let monacoEditor = null;
  let editorOpen = false;
  let monacoReady = false;

  require(['vs/editor/editor.main'], function() {
    monaco.editor.defineTheme('compiler-dark', {
      base: 'vs-dark',
      inherit: true,
      rules: [
        { token: 'tag', foreground: '50fa7b' },
        { token: 'attribute.name', foreground: 'ffb86c' },
        { token: 'attribute.value', foreground: 'f1fa8c' },
        { token: 'comment', foreground: '6272a4', fontStyle: 'italic' },
      ],
      colors: {
        'editor.background': '#0d0f2b',
        'editor.foreground': '#f8f8f2',
        'editorLineNumber.foreground': '#3a3f6b',
        'editor.selectionBackground': '#44475a',
        'editor.lineHighlightBackground': '#1a1f4e',
        'editorCursor.foreground': '#00ff88',
        'editor.findMatchBackground': '#ffb86c44',
      }
    });
    monacoEditor = monaco.editor.create(document.getElementById('monacoContainer'), {
      value: sourceContent || '',
      language: 'html',
      theme: 'compiler-dark',
      fontSize: 12,
      fontFamily: "'JetBrains Mono', monospace",
      minimap: { enabled: false },
      wordWrap: 'on',
      lineNumbers: 'on',
      automaticLayout: true,
    });
    
    monaco.editor.onDidChangeMarkers(([uri]) => {
      const markers = monaco.editor.getModelMarkers({ resource: uri });
      lspDiagnostics = markers.map(m => ({
        line: m.startLineNumber,
        col: m.startColumn,
        severity: m.severity === monaco.MarkerSeverity.Error ? 1 : 2,
        message: m.message
      }));
      updateGutterOverlay();
      updateStatusBar();
      processLSPVeto();
    });

    monacoEditor.onDidChangeModelContent(() => {
      if (!monacoReady) return;
      const val = monacoEditor.getValue();
      if (val !== sourceContent) {
        pushState();
        sourceContent = val;
        render(sourceContent);
      }
    });
    monacoReady = true;
  });

  function syncEditorContent(src) {
    if (monacoEditor && src !== monacoEditor.getValue()) {
      monacoReady = false;
      monacoEditor.setValue(src || '');
      monacoReady = true;
    }
  }

  document.getElementById('editorToggleBtn').addEventListener('click', () => {
    editorOpen = !editorOpen;
    document.getElementById('editorPane').classList.toggle('open', editorOpen);
    const btn = document.getElementById('editorToggleBtn');
    btn.textContent = editorOpen ? '⬛ Hide Editor' : '⬛ Editor';
    if (editorOpen && monacoEditor) {
      syncEditorContent(sourceContent);
      monacoEditor.layout();
    }
  });

  window.addEventListener('load', () => {
    const saved = localStorage.getItem('aicompiler_source');
    if (saved && !sourceContent) {
      sourceContent = saved;
      render(sourceContent);
      syncEditorContent(sourceContent);
    }
  });

  function updateStatusBar() {
    const lines = sourceContent ? sourceContent.split('\n').length : 0;
    const warns = lspDiagnostics.length;
    const name = fileHandle ? fileHandle.name : (sourceContent ? 'Memory' : 'Empty');
    document.getElementById('statusRight').textContent = `📄 ${name} · ${lines} lines · 🔌 ${warns} LSP · ↩ ${undoStack.length} · ↪ ${redoStack.length}`;
  }

  // ── Core Logistics ──────────────────────────────────────
  function checkBrackets(src) {
    const counts = { '{': 0, '(': 0, '[': 0 };
    const closers = { '}': '{', ')': '(', ']': '[' };
    let inStr = false, strChar = '';
    for (let i = 0; i < src.length; i++) {
      const ch = src[i];
      if (inStr) { if (ch === '\\') { i++; continue; } if (ch === strChar) inStr = false; continue; }
      if (ch === '"' || ch === "'") { inStr = true; strChar = ch; continue; }
      if (counts[ch] !== undefined) counts[ch]++;
      if (closers[ch]) counts[closers[ch]]--;
    }
    return Object.entries(counts).filter(([,v]) => v !== 0);
  }

  function parseAllBlocks(text) {
    const cleaned = text.replace(/\/\/\s*(OLD|NEW)\s*CHUNK\s*/gi, '').trim();
    const units = cleaned.split(/={3}BLOCK={3}/i).map(u => u.trim()).filter(Boolean);
    if (units.length > 1) {
      return units.map(u => {
        if (!u.includes('===SPLIT===')) return null;
        const idx = u.indexOf('===SPLIT===');
        return { oldCode: u.slice(0, idx).trim(), newCode: u.slice(idx+11).trim() };
      }).filter(Boolean);
    }
    if (cleaned.includes('===SPLIT===')) {
      const idx = cleaned.indexOf('===SPLIT===');
      const oldPart = cleaned.slice(0, idx).trim();
      const newPart = cleaned.slice(idx + 11).trim();
      if (oldPart.length > 0 && newPart.length > 0) return [{ oldCode: oldPart, newCode: newPart }];
    }
    return [];
  }

  function flash() { $fring.classList.add('on'); setTimeout(() => $fring.classList.remove('on'), 400); }
  function toast(msg) { $toast.textContent = msg; $toast.classList.add('show'); setTimeout(() => $toast.classList.remove('show'), 2500); }

  function pushState() {
    if (sourceContent) {
      undoStack.push(sourceContent);
      if (undoStack.length > 50) undoStack.shift();
      redoStack = []; 
      document.getElementById('undoBtn').disabled = false;
      document.getElementById('redoBtn').disabled = true;
      updateStatusBar();
    }
  }

  document.getElementById('undoBtn').addEventListener('click', async () => {
    if (undoStack.length === 0) return;
    redoStack.push(sourceContent);
    document.getElementById('redoBtn').disabled = false;
    sourceContent = undoStack.pop();
    if (undoStack.length === 0) document.getElementById('undoBtn').disabled = true;
    render(sourceContent); syncEditorContent(sourceContent);
    if (fileHandle) await nativeSilentSave(sourceContent);
    toast("↩ Undo applied");
  });

  document.getElementById('redoBtn').addEventListener('click', async () => {
    if (redoStack.length === 0) return;
    undoStack.push(sourceContent);
    document.getElementById('undoBtn').disabled = false;
    sourceContent = redoStack.pop();
    if (redoStack.length === 0) document.getElementById('redoBtn').disabled = true;
    render(sourceContent); syncEditorContent(sourceContent);
    if (fileHandle) await nativeSilentSave(sourceContent);
    toast("↪ Redo applied");
  });

  function render(src) {
    setTimeout(() => {
      try {
        const bridge = `<script>window.onerror = function(msg,src,line,col,err){ window.parent.postMessage({__compilerErr: 'Line '+line+': '+msg},'*'); return true; };<\/script>`;
        $pv.srcdoc = bridge + src;
        localStorage.setItem('aicompiler_source', src);
      } catch(e) {}
      flash(); updateStatusBar(); nativeSilentSave(src);
    }, 100);
  }

  async function nativeSilentSave(newContent) {
    if (fileHandle) {
      try {
        const writable = await fileHandle.createWritable();
        await writable.write(newContent); await writable.close();
      } catch (err) { }
    } 
  }

  document.getElementById('fileBtn').addEventListener('click', async () => {
    try {
      [fileHandle] = await window.showOpenFilePicker();
      const file = await fileHandle.getFile();
      sourceContent = (await file.text()).replace(/\r\n/g, '\n');
      document.getElementById('fileBtn').textContent = `📄 ${file.name}`;
      undoStack = []; redoStack = [];
      document.getElementById('undoBtn').disabled = true;
      document.getElementById('redoBtn').disabled = true;
      render(sourceContent); syncEditorContent(sourceContent);
      toast(`Linked: ${file.name}`);
    } catch (err) {}
  });

  function findFingerprintedChunk(source, chunk) {
    const buildResult = (startIdx, matchedText) => {
      const lineStartIdx = source.lastIndexOf('\n', startIdx - 1) + 1;
      const leadingSpace = source.substring(lineStartIdx, startIdx).match(/^[ \t]*/)[0];
      const conf = Math.round((Math.min(chunk.length, matchedText.length) / Math.max(chunk.length, matchedText.length)) * 100);
      return { originalText: matchedText, startIndex: startIdx, endIndex: startIdx + matchedText.length, baseIndent: leadingSpace, confidence: conf };
    };
    const literalIdx = source.indexOf(chunk);
    if (literalIdx !== -1) return buildResult(literalIdx, chunk);
    try {
      const escaped = chunk.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/\s+/g, '\\s+');
      const allMatches = [...source.matchAll(new RegExp(escaped, 'g'))];
      if (allMatches.length > 0) return buildResult(allMatches[0].index, allMatches[0][0]);
      return null;
    } catch(e) { return null; }
  }

  document.addEventListener('paste', async (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return; 
    const text = (e.clipboardData || window.clipboardData).getData('text');
    if (text && (text.includes('===SPLIT==='))) {
      e.preventDefault(); await processTextBlocks(text);
    } else if (text && !sourceContent && text.includes('<html')) {
      e.preventDefault(); render(text); syncEditorContent(text); toast("⚡ Auto-Previewed HTML");
    }
  });

  document.getElementById('pasteProcessBtn').addEventListener('click', async () => {
    if (!sourceContent) return toast("❌ Load source first!");
    try { 
      const textToProcess = await navigator.clipboard.readText(); 
      if (textToProcess) await processTextBlocks(textToProcess);
    } catch(e) { toast("❌ Use Ctrl+V"); }
  });

  async function processTextBlocks(text) {
    const blocks = parseAllBlocks(text);
    if (blocks.length === 0) return showError("Parse Error", "No valid blocks found.");
    let appliedCount = 0; let errors = [];
    for (let bi = blocks.length - 1; bi >= 0; bi--) {
      const result = await autoLockAndApply(blocks[bi]);
      if (result === true) appliedCount++;
      else errors.push(`Block ${blocks.length - bi}: ${result}`);
    }
    if (errors.length > 0) showError("Patch Application Failed", errors.join('\n\n---\n\n'));
    else if (appliedCount > 0) toast(`✨ ${appliedCount} patches applied!`);
  }

  async function autoLockAndApply(parsed) {
    const loc = findFingerprintedChunk(sourceContent, parsed.oldCode);
    if (!loc) return "Patcher could not locate the code."; 
    let newT = parsed.newCode.replace(/\r\n/g, '\n');
    pushState();
    const prePatchContent = sourceContent;
    sourceContent = sourceContent.slice(0, loc.startIndex) + newT + sourceContent.slice(loc.endIndex);
    const broken = checkBrackets(sourceContent);
    if (broken.length > 0) {
      sourceContent = prePatchContent; undoStack.pop(); updateStatusBar();
      return `AST Guard: Unbalanced brackets detected.`;
    }
    render(sourceContent); syncEditorContent(sourceContent);
    return true;
  }

  function updateGutterOverlay() {
    const overlay = document.getElementById('gutterOverlay'); overlay.innerHTML = '';
    if (!sourceContent || lspDiagnostics.length === 0) return;
    const totalLines = sourceContent.split('\n').length || 1;
    const pvH = window.innerHeight - 22;
    lspDiagnostics.forEach(d => {
      const el = document.createElement('div');
      el.className = 'gutter-mark ' + (d.severity === 1 ? 'error' : 'warning');
      el.style.top = Math.max(0, Math.floor((d.line / totalLines) * pvH) - 2) + 'px';
      overlay.appendChild(el);
    });
  }

  function processLSPVeto() {
    if (pendingLSPVeto) {
      pendingLSPVeto = false;
      const errors = lspDiagnostics.filter(d => d.severity === 1);
      if (errors.length > 0) {
        sourceContent = undoStack.pop(); render(sourceContent); syncEditorContent(sourceContent);
        showError("LSP Guard", `Fatal syntax errors detected.`);
      }
    }
  }
</script>
</body>
</html>
