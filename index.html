<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Compile</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000432">
<link rel="apple-touch-icon" href="./icon-192.png">

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000432; font-family: sans-serif; }

  #preview {
    position:fixed; inset:0;
    width:100%; height:100%;
    border:none; background:#000432;
    z-index:1;
  }

  #sync-layer {
    position: fixed; inset: 0;
    z-index: 999;
    background: transparent;
  }

  #fring {
    position:fixed; inset:0; z-index:99;
    border:4px solid #00ff88;
    box-shadow: inset 0 0 60px rgba(0,255,136,.15);
    pointer-events:none;
    opacity:0; transition:opacity .4s;
  }
  #fring.on { opacity:1; }

  #toast {
    position:fixed; bottom:30px; left:50%;
    transform:translateX(-50%);
    padding:8px 16px; border-radius:25px;
    font:700 11px 'JetBrains Mono',monospace;
    background:rgba(0,0,0,0.85);
    border:1px solid #00ff88;
    color:#00ff88;
    backdrop-filter:blur(10px);
    z-index:1000; pointer-events:none;
    opacity:0; transition:opacity .25s;
    white-space: nowrap;
  }
  #toast.show { opacity:1; }

  #status-dot {
    position: fixed; top: 10px; right: 10px;
    width: 8px; height: 8px; border-radius: 50%;
    background: #00ff88; z-index: 1001;
    box-shadow: 0 0 10px #00ff88;
  }
</style>
</head>
<body>

<div id="status-dot"></div>
<div id="sync-layer"></div>
<iframe id="preview" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups"></iframe>
<div id="fring"></div>
<div id="toast"></div>

<script>
  let lastClip = '';
  const $pv    = document.getElementById('preview');
  const $fring = document.getElementById('fring');
  const $toast = document.getElementById('toast');
  const $sync  = document.getElementById('sync-layer');
  let toastTimer;

  function flash() {
    $fring.classList.add('on');
    setTimeout(() => $fring.classList.remove('on'), 500);
  }

  function toast(msg) {
    clearTimeout(toastTimer);
    $toast.textContent = msg;
    $toast.classList.add('show');
    toastTimer = setTimeout(() => $toast.classList.remove('show'), 2000);
  }

  function isCode(t) {
    if (!t || t.length < 15) return false;
    return [
      /<(!DOCTYPE|html|head|body|div|span|script|style|p |h[1-6]|a |img|form|input|button)/i,
      /function[\s(]/, /const\s+\w+\s*=/, /let\s+\w+\s*=/,
      /=>\s*[{(]/, /console\.log/, /document\.(get|query)/,
      /\{[\n\r\s]*[\w-]+\s*:/,
    ].some(r => r.test(t));
  }

  function render(src) {
    try {
      const d = $pv.contentDocument || $pv.contentWindow.document;
      d.open(); 
      d.write(src); 
      d.close();
      flash();
      const lines = src.split('\n').length;
      toast(`⚡ COMPILED ${lines} LINES`);
    } catch(e) {
      toast("❌ Render Error");
    }
  }

  async function syncClipboard() {
    try {
      const text = await navigator.clipboard.readText();
      if (!text) { toast("Clipboard Empty"); return; }
      if (text === lastClip) { toast("No Changes Detected"); return; }

      lastClip = text;
      if (isCode(text)) {
        render(text);
      } else {
        toast("Not valid code/HTML");
      }
    } catch (err) {
      toast("Tap to grant Clipboard Permission");
    }
  }

  $sync.addEventListener('click', syncClipboard);
  window.onload = () => toast("READY: TAP SCREEN TO COMPILE");

  // --- PWA Service Worker Registration ---
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW Registered!', reg))
        .catch(err => console.error('SW failed', err));
    });
  }
</script>
</body>
</html>
